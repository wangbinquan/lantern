name: Release

# Build standalone single-file binaries (Bun runtime + ssh2 + sqlite + MCP SDK all
# bundled in) for every platform and attach them to a GitHub release on a v* tag.
# `workflow_dispatch` builds + uploads artifacts WITHOUT publishing a release, so the
# cross-compile can be verified without cutting a tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the release + upload assets

jobs:
  binaries:
    name: Cross-compile binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.x'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile for all targets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Bun cross-compiles from one runner; the matching runtime is fetched per target.
          for t in bun-linux-x64 bun-linux-arm64 bun-darwin-x64 bun-darwin-arm64 bun-windows-x64; do
            os="${t#bun-}"                       # e.g. linux-x64
            ext=""; case "$t" in *windows*) ext=".exe";; esac
            echo "::group::$t"
            bun build --compile --target="$t" --outfile "dist/lantern-mcp-${os}${ext}" src/mcp/server.ts
            bun build --compile --target="$t" --outfile "dist/lantern-${os}${ext}"     src/cli/lantern.ts
            echo "::endgroup::"
          done
          ( cd dist && sha256sum ./* > SHA256SUMS )
          ls -la dist

      - name: Upload build artifacts (always — lets workflow_dispatch verify the build)
        uses: actions/upload-artifact@v4
        with:
          name: lantern-binaries
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --title "${GITHUB_REF_NAME}"
